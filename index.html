  .semana-btn.active { background: var(--red); color: white; }
  .days-scroll { display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; padding-bottom: 2px; }
  .days-scroll::-webkit-scrollbar { display: none; }
  .day-tab { flex-shrink: 0; padding: 7px 14px; border-radius: 20px; border: 0.5px solid var(--border); font-size: 12px; font-weight: 500; color: var(--muted); background: transparent; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
  .day-tab.active { background: var(--red); border-color: var(--red); color: white; }
  .content { padding: 16px 16px 0; }
  .day-panel { display: none; }
  .day-panel.active { display: block; }
  .day-title { font-family: 'Bebas Neue', sans-serif; font-size: 32px; letter-spacing: 2px; margin-bottom: 4px; }
  .day-subtitle { font-size: 12px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; }
  .day-fecha { font-size: 11px; color: var(--red); letter-spacing: 1px; margin-bottom: 16px; }
  .progress-wrap { background: rgba(255,255,255,0.06); border-radius: 4px; height: 3px; margin-bottom: 16px; overflow: hidden; }
  .progress-bar { height: 100%; background: var(--red); border-radius: 4px; transition: width 0.3s; }
  .section-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--red); margin: 20px 0 10px; font-weight: 600; }
  .exercise-card { background: var(--card); border: 0.5px solid var(--border); border-radius: 12px; margin-bottom: 12px; overflow: hidden; }
  .exercise-header { padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; user-select: none; }
  .exercise-header-left { flex: 1; }
  .exercise-name-wrap { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
  .exercise-name { font-size: 14px; font-weight: 600; color: var(--text); }
  .edit-name-btn { font-size: 11px; color: var(--muted); background: rgba(255,255,255,0.05); border: 0.5px solid var(--border); border-radius: 6px; padding: 2px 7px; cursor: pointer; flex-shrink: 0; font-family: 'DM Sans', sans-serif; transition: all 0.2s; }
  .edit-name-btn:active { background: rgba(225,8,19,0.15); border-color: var(--red); color: var(--red); }
  .exercise-meta { display: flex; gap: 8px; flex-wrap: wrap; }
  .meta-pill { font-size: 11px; color: var(--muted); background: rgba(255,255,255,0.05); padding: 2px 8px; border-radius: 10px; }
  .meta-pill.rpe { color: var(--yellow); }
  .exercise-chevron { font-size: 18px; color: var(--muted); transition: transform 0.2s; margin-left: 12px; }
  .exercise-card.open .exercise-chevron { transform: rotate(180deg); }
  .series-container { display: none; padding: 0 16px 16px; border-top: 0.5px solid var(--border); }
  .exercise-card.open .series-container { display: block; }
  .series-header { display: grid; grid-template-columns: 28px 1fr 1fr 60px 60px 50px; gap: 6px; padding: 10px 0 6px; font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); }

  .serie-input:focus { outline: none; border-color: var(--red); }
  .serie-input::placeholder { color: rgba(255,255,255,0.2); font-size: 12px; }
  .serie-status { display: flex; align-items: center; justify-content: center; }
  .check-btn { width: 32px; height: 32px; border-radius: 50%; border: 0.5px solid var(--border); background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; color: var(--muted); transition: all 0.2s; }
  .check-btn.done { background: var(--green); border-color: var(--green); color: white; }
  .hist-section { margin-top: 10px; }
  .hist-label { font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
  .hist-row { display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; padding-bottom: 4px; }

  .nota-label { font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin: 10px 0 6px; }

  .nota-input::placeholder { color: rgba(255,255,255,0.2); }

  .modal-overlay.show { display: flex; }
  .modal { background: #1a1a1a; border: 0.5px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 28px 24px; width: 100%; max-width: 400px; }

  .modal-btns { display: flex; gap: 10px; }
  .modal-ok { flex: 1; background: var(--red); color: white; border: none; border-radius: 10px; padding: 14px; font-size: 13px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; font-family: 'DM Sans', sans-serif; }
  .modal-cancel { background: rgba(255,255,255,0.06); color: var(--muted); border: 0.5px solid var(--border); border-radius: 10px; padding: 14px 18px; font-size: 13px; cursor: pointer; font-family: 'DM Sans', sans-serif; }

  .toast.ok { background: var(--green); }

</head>

  const opts = { method, headers: { 'apikey': SUPA_KEY, 'Authorization': 'Bearer '+SUPA_KEY, 'Content-Type': 'application/json', 'Prefer': method==='POST' ? 'resolution=merge-duplicates' : '' } };

      { name:'Buenos días', rp:10, rpe:7, series:3, pausa:'2.5', rir:3 },
    ]},
    { label:'Vuelta a la calma', exercises:[{ name:'Ejercicio cardiovascular', rp:20, rpe:4, series:1, pausa:'-', rir:'-' }]}
  ]},
  { id:'s2-accesorios', name:'Accesorios', sub:'Hombros · Lumbar · Core', sections:[
    { label:'Calentamiento', exercises:[{ name:'Movilidad articular y funcional', rp:"5'", rpe:'x', series:1, pausa:'x', rir:'-' }]},
    { label:'Trabajo inicial', exercises:[
      { name:'Press militar en máquina', rp:10, rpe:8, series:2, pausa:'2.5', rir:3 },
      { name:'Laterales con mancuernas', rp:12, rpe:8, series:3, pausa:'2.5', rir:3 },
      { name:'Hiperextensión lumbar', rp:10, rpe:7, series:3, pausa:'2.5', rir:3 },
      { name:'Rackpull', rp:10, rpe:6, series:3, pausa:'2.5', rir:3 },
      { name:'Pallof press', rp:15, rpe:6, series:4, pausa:'2.5', rir:3 },
    ]},
    { label:'Vuelta a la calma', exercises:[{ name:'Ejercicio cardiovascular', rp:20, rpe:4, series:1, pausa:'-', rir:'-' }]}
  ]},
  { id:'s2-empuje-traccion', name:'Empuje/Tracción', sub:'Empuje · Tracción', sections:[
    { label:'Calentamiento', exercises:[{ name:'Movilidad articular y funcional', rp:"5'", rpe:'x', series:1, pausa:'x', rir:'-' }]},
    { label:'Trabajo inicial', exercises:[
      { name:'Press de banco pin', rp:8, rpe:8, series:3, pausa:'2.5', rir:'-' },
      { name:'Dominadas predominancia excéntrica', rp:10, rpe:7, series:3, pausa:'2.5', rir:'-' },
      { name:'Fondos negativos', rp:12, rpe:7, series:3, pausa:'2.5', rir:'-' },
      { name:'Remo unilateral con mancuerna', rp:10, rpe:6, series:3, pausa:'2.5', rir:'-' },
    ]},
    { label:'Vuelta a la calma', exercises:[{ name:'Ejercicio cardiovascular', rp:20, rpe:4, series:1, pausa:'-', rir:'-' }]}
  ]}
];

let activeSemana=1, activeDay=0, localData={}, historial={}, editingKey=null, saving=false;
function getCurrentDays(){ return activeSemana===1 ? DAYS_S1 : DAYS_S2; }
function todayStr(){ return new Date().toISOString().split('T')[0]; }
function formatFecha(s){ const [y,m,d]=s.split('-'); return `${d}/${m}/${y}`; }

async function loadHistorial(dayId){
  try {
    const rows = await supaFetch(`/rest/v1/sesiones?dia_id=eq.${dayId}&order=fecha.desc,serie_idx.asc`);
    historial={};
    const today=todayStr();
    rows.forEach(r=>{
      if(!historial[r.ejercicio_key]) historial[r.ejercicio_key]=[];
      historial[r.ejercicio_key].push(r);
      if(r.fecha===today){
        if(!localData[r.ejercicio_key]) localData[r.ejercicio_key]={series:{}};
        if(!localData[r.ejercicio_key].series) localData[r.ejercicio_key].series={};
        localData[r.ejercicio_key].series[r.serie_idx]={ reps:r.reps, carga:r.carga, rpe:r.rpe_real, rir:r.rir_real, done:r.done };
        if(r.nota && r.serie_idx===0) localData[r.ejercicio_key].nota=r.nota;
      }
    });
  } catch(e){ console.error('Load error:',e); }
}

async function saveSession(){
  if(saving) return;
  saving=true;
  const btn=document.getElementById('saveBtn');
  btn.disabled=true; btn.textContent='Guardando...';
  const DAYS=getCurrentDays(), day=DAYS[activeDay], today=todayStr(), rows=[];
  day.sections.forEach((s,si)=>{
    s.exercises.forEach((ex,ei)=>{
      const key=`${day.id}-${si}-${ei}`;
      const ld=localData[key]||{}, series=ld.series||{}, nota=ld.nota||null;
      const n=parseInt(ex.series);
      if(!isNaN(n)){
        for(let i=0;i<n;i++){
          const sv=series[i]||{};
          rows.push({ semana:activeSemana, dia_id:day.id, ejercicio_key:key, serie_idx:i,
            reps:sv.reps?parseInt(sv.reps):null, carga:sv.carga?parseFloat(sv.carga):null,
            rpe_real:sv.rpe?parseFloat(sv.rpe):null, rir_real:sv.rir?parseInt(sv.rir):null,
            done:sv.done||false, nota:i===0?nota:null, fecha:today });
        }
      }
    });
  });
  try {
    await supaFetch('/rest/v1/sesiones','POST',rows);
    showToast('✓ Guardado en la nube','ok');
    await loadHistorial(day.id);
    buildUI();
  } catch(e){ showToast('Error al guardar','err'); console.error(e); }
  saving=false; btn.disabled=false; btn.textContent='Guardar sesión';
}

function switchSemana(n){
  activeSemana=n; activeDay=0; localData={}; historial={};
  document.getElementById('btnS1').classList.toggle('active',n===1);
  document.getElementById('btnS2').classList.toggle('active',n===2);
  loadHistorial(getCurrentDays()[0].id).then(()=>buildUI());
}

function buildUI(){
  const DAYS=getCurrentDays();
  const tabsEl=document.getElementById('dayTabs'), panelsEl=document.getElementById('dayPanels');
  tabsEl.innerHTML=''; panelsEl.innerHTML='';
  DAYS.forEach((day,di)=>{
    const tab=document.createElement('button');
    tab.className='day-tab'+(di===activeDay?' active':'');
    tab.textContent=day.name;
    tab.onclick=()=>{ activeDay=di; localData={}; historial={}; loadHistorial(day.id).then(()=>buildUI()); };
    tabsEl.appendChild(tab);
    const panel=document.createElement('div');
    panel.className='day-panel'+(di===activeDay?' active':'');
    const total=day.sections.reduce((a,s)=>a+s.exercises.reduce((b,e)=>{const n=parseInt(e.series);return b+(isNaN(n)?0:n);},0),0);
    const done=countDone(day.id,day.sections);
    const pct=total>0?Math.round((done/total)*100):0;
    let html=`<div class="day-title">${day.name}</div><div class="day-subtitle">${day.sub}</div><div class="day-fecha">${formatFecha(todayStr())}</div><div class="progress-wrap"><div class="progress-bar" style="width:${pct}%"></div></div>`;
    day.sections.forEach((section,si)=>{
      html+=`<div class="section-label">${section.label}</div>`;
      section.exercises.forEach((ex,ei)=>{
        const key=`${day.id}-${si}-${ei}`;
        const saved=localData[key]||{};
        html+=buildExCard(key,ex,saved.customName||ex.name,saved.open||false);
      });
    });
    panel.innerHTML=html; panelsEl.appendChild(panel);
  });
  attachEvents();
}

function buildExCard(key,ex,customName,isOpen){
  const saved=localData[key]||{}, seriesData=saved.series||{}, nota=saved.nota||'';
  const numSeries=parseInt(ex.series), hasRows=!isNaN(numSeries)&&numSeries>0;
  const hist=historial[key]||[];
  const byFecha={};
  hist.forEach(r=>{ if(!byFecha[r.fecha]) byFecha[r.fecha]=[]; byFecha[r.fecha].push(r); });
  const fechas=Object.keys(byFecha).sort().reverse().filter(f=>f!==todayStr()).slice(0,3);
  let histHTML='';
  if(fechas.length>0){
    const chips=fechas.map(f=>{
      const rows=byFecha[f].filter(r=>r.carga);
      if(!rows.length) return '';
      const maxC=Math.max(...rows.map(r=>parseFloat(r.carga)||0));
      const maxR=rows.find(r=>parseFloat(r.carga)===maxC)?.reps||'-';
      return `<div class="hist-chip">${formatFecha(f)} — <span>${maxC}kg × ${maxR}</span></div>`;
    }).join('');
    if(chips) histHTML=`<div class="hist-section"><div class="hist-label">Historial</div><div class="hist-row">${chips}</div></div>`;
  }
  let seriesRows='';
  if(hasRows){
    for(let i=0;i<numSeries;i++){
      const s=seriesData[i]||{};
      const prev=hist.find(r=>r.serie_idx===i&&r.fecha!==todayStr());
      const repsPH=prev?.reps||ex.rp, cargaPH=prev?.carga?`${prev.carga}kg`:'kg';
      seriesRows+=`<div class="serie-row">
        <div class="serie-num">${i+1}</div>
        <input class="serie-input" type="number" placeholder="${repsPH}" value="${s.reps||''}" inputmode="numeric" onchange="setField('${key}',${i},'reps',this.value)">
        <input class="serie-input" type="number" placeholder="${cargaPH}" value="${s.carga||''}" inputmode="decimal" onchange="setField('${key}',${i},'carga',this.value)">
        <input class="serie-input" type="number" placeholder="${ex.rpe}" value="${s.rpe||''}" inputmode="decimal" style="font-size:12px" onchange="setField('${key}',${i},'rpe',this.value)">
        <input class="serie-input" type="number" placeholder="${ex.rir}" value="${s.rir||''}" inputmode="numeric" style="font-size:12px" onchange="setField('${key}',${i},'rir',this.value)">
        <div class="serie-status"><button class="check-btn${s.done?' done':''}" data-key="${key}" data-idx="${i}">${s.done?'✓':''}</button></div>
      </div>`;
    }
  }
  return `<div class="exercise-card${isOpen?' open':''}" data-key="${key}">
    <div class="exercise-header">
      <div class="exercise-header-left">
        <div class="exercise-name-wrap">
          <div class="exercise-name">${customName}</div>
          <button class="edit-name-btn" data-key="${key}" data-name="${customName}" onclick="openModal(event,'${key}',this.dataset.name)">✎ editar</button>
        </div>
        <div class="exercise-meta">
          <span class="meta-pill">${hasRows?ex.series+' ×':''} ${ex.rp} reps</span>
          <span class="meta-pill rpe">RPE ${ex.rpe}</span>
          ${ex.rir!=='-'?`<span class="meta-pill">RIR ${ex.rir}</span>`:''}
          <span class="meta-pill">Pausa ${ex.pausa}′</span>
        </div>
      </div>
      <div class="exercise-chevron">⌄</div>
    </div>
    <div class="series-container">
      ${hasRows?`<div class="series-header"><div>#</div><div>Reps</div><div>Carga</div><div>RPE</div><div>RIR</div><div>✓</div></div>${seriesRows}`:''}
      ${histHTML}
      <div class="nota-label">Notas</div>
      <textarea class="nota-input" placeholder="Sensaciones, ajustes, PR..." onchange="setNota('${key}',this.value)">${nota}</textarea>
    </div>
  </div>`;
}

function attachEvents(){
  document.querySelectorAll('.exercise-header').forEach(h=>{
    h.onclick=function(e){
      if(e.target.classList.contains('edit-name-btn')) return;
      const card=this.closest('.exercise-card'), key=card.dataset.key;
      card.classList.toggle('open');
      if(!localData[key]) localData[key]={};
      localData[key].open=card.classList.contains('open');
    };
  });
  document.querySelectorAll('.check-btn').forEach(btn=>{
    btn.onclick=function(){
      this.classList.toggle('done'); this.textContent=this.classList.contains('done')?'✓':'';
      const key=this.dataset.key, idx=this.dataset.idx;
      if(!localData[key]) localData[key]={};
      if(!localData[key].series) localData[key].series={};
      if(!localData[key].series[idx]) localData[key].series[idx]={};
      localData[key].series[idx].done=this.classList.contains('done');
      updateProgress();
    };
  });
}

function setField(key,idx,field,value){ if(!localData[key]) localData[key]={}; if(!localData[key].series) localData[key].series={}; if(!localData[key].series[idx]) localData[key].series[idx]={}; localData[key].series[idx][field]=value; }
function setNota(key,value){ if(!localData[key]) localData[key]={}; localData[key].nota=value; }
function countDone(dayId,sections){ let c=0; sections.forEach((s,si)=>s.exercises.forEach((ex,ei)=>{ const key=`${dayId}-${si}-${ei}`, series=(localData[key]||{}).series||{}, n=parseInt(ex.series); if(!isNaN(n)) for(let i=0;i<n;i++) if(series[i]?.done) c++; })); return c; }
function updateProgress(){ const DAYS=getCurrentDays(),day=DAYS[activeDay]; const total=day.sections.reduce((a,s)=>a+s.exercises.reduce((b,e)=>{const n=parseInt(e.series);return b+(isNaN(n)?0:n);},0),0); const done=countDone(day.id,day.sections); const bar=document.querySelector('.progress-bar'); if(bar) bar.style.width=(total>0?Math.round((done/total)*100):0)+'%'; }
function openModal(e,key,name){ e.stopPropagation(); editingKey=key; document.getElementById('modalInput').value=name; document.getElementById('modalOverlay').classList.add('show'); setTimeout(()=>document.getElementById('modalInput').focus(),100); }
function closeModal(){ document.getElementById('modalOverlay').classList.remove('show'); editingKey=null; }
function confirmEdit(){ const n=document.getElementById('modalInput').value.trim(); if(!n||!editingKey){closeModal();return;} if(!localData[editingKey]) localData[editingKey]={}; localData[editingKey].customName=n; closeModal(); buildUI(); }
document.getElementById('modalOverlay').addEventListener('click',function(e){if(e.target===this)closeModal();});
document.getElementById('modalInput').addEventListener('keydown',function(e){if(e.key==='Enter')confirmEdit();if(e.key==='Escape')closeModal();});
function resetDay(){ if(!confirm('¿Borrar datos del día en pantalla?')) return; const DAYS=getCurrentDays(),day=DAYS[activeDay]; day.sections.forEach((s,si)=>s.exercises.forEach((ex,ei)=>{ const key=`${day.id}-${si}-${ei}`; if(localData[key]){localData[key].series={};localData[key].nota='';} })); buildUI(); }
function showToast(msg,type='ok'){ const t=document.getElementById('toast'); t.textContent=msg; t.className=`toast ${type} show`; setTimeout(()=>t.classList.remove('show'),2500); }

loadHistorial(getCurrentDays()[0].id).then(()=>buildUI());
</script>
